apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-prod
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring-prod
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 82.14.1
      helm:
        releaseName: monitoring-prod
        skipCrds: true
        valueFiles:
          - $values/value_files/values-prod.yaml
    - repoURL: https://github.com/sagiv-Ha/DevExpert_Monitoring.git
      targetRevision: main
      ref: values
  syncPolicy:
    syncOptions:
      - CreateNamespace=true